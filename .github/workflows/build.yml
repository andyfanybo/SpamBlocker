name: Android CI Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        type: choice
        default: 'debug'
        options:
          - debug
          - release

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: 接受 Android SDK 许可
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
          cache-disabled: false

      - name: 构建 Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        run: gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.log || true
        shell: bash

      - name: 打印编译错误
        if: ${{ (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '') && always() }}
        run: |
          if [ -f build-output.log ]; then
            echo "=== 编译错误详情 ==="
            grep -iE 'error:|Error |unresolved|cannot find|Type mismatch|expecting' build-output.log || echo "未找到明确错误信息"
            echo "=== 最后 80 行 ==="
            tail -80 build-output.log
          fi
        shell: bash

      - name: 检查 APK 是否生成
        if: ${{ (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '') && always() }}
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK 构建成功"
          else
            echo "APK 构建失败，请查看上方编译错误"
            exit 1
          fi
        shell: bash

      - name: 上传构建日志
        if: ${{ (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '') && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-log-debug
          path: build-output.log
          retention-days: 7
          if-no-files-found: ignore

      - name: 构建 Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: 上传 Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: SpamBlocker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          compression-level: 6

      - name: 上传 Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: SpamBlocker-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          compression-level: 6

  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    needs: build
    if: ${{ false }}  # 默认跳过，需要时手动开启

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: 运行 Lint
        run: gradle lint --no-daemon

  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_type == 'release' }}

    steps:
      - name: 下载 Debug APK
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/download-artifact@v4
        with:
          name: SpamBlocker-debug

      - name: 下载 Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/download-artifact@v4
        with:
          name: SpamBlocker-release

      - name: 创建 Release 并上传 APK
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Latest Release Build' }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: app/build/outputs/apk/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
