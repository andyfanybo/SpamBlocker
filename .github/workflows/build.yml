name: Android CI Build

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        type: choice
        default: 'debug'
        options:
          - debug
          - release

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: 缓存 Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: 授予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建 Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        run: ./gradlew assembleDebug --stacktrace

      - name: 构建 Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: ./gradlew assembleRelease --stacktrace

      - name: 上传 Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: SpamBlocker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          compression-level: 6

      - name: 上传 Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: SpamBlocker-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          compression-level: 6

  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    needs: build
    if: ${{ false }}  # 默认跳过，需要时手动开启

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 运行 Lint
        run: ./gradlew lint
